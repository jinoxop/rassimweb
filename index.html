<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RASSIM STORE</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#050b18;
    overflow:hidden;
    color:white;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

.login-screen,
.main-site{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:10;
}

.login-box{
    background:rgba(0,0,0,0.75);
    border:2px solid #00aaff;
    box-shadow:0 0 30px #00aaff;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:350px;
}

.login-box h1{
    color:#00aaff;
    margin-bottom:25px;
    letter-spacing:3px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#08101f;
    color:white;
    border:1px solid #00aaff;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00aaff;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    box-shadow:0 0 20px #00aaff;
}

.main-site{
    display:none;
    text-align:center;
    width:90%;
    max-width:700px;
}

.store-box{
    background:rgba(0,0,0,0.7);
    border:2px solid #00aaff;
    border-radius:25px;
    padding:40px;
    box-shadow:0 0 40px #00aaff;
}

.store-title{
    font-size:55px;
    color:#00aaff;
    margin-bottom:30px;
    text-shadow:0 0 20px #00aaff;
}

.panel{
    margin:25px 0;
    padding:15px;
    border:1px solid #00aaff;
    border-radius:15px;
    background:rgba(0,170,255,0.08);
}

.panel h2{
    color:#00c8ff;
    margin-bottom:10px;
}

.price{
    font-size:28px;
    font-weight:bold;
}

.discord{
    margin-top:40px;
}

.discord a{
    text-decoration:none;
    font-size:70px;
    color:#00aaff;
    transition:.3s;
}

.discord a:hover{
    text-shadow:0 0 30px #00aaff;
}
</style>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<canvas id="bg"></canvas>

<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>LOGIN WEB</h1>

        <input type="password"
        id="password"
        placeholder="Enter Password">

        <button onclick="login()">LOGIN</button>
    </div>
</div>

<div class="main-site" id="mainSite">
    <div class="store-box">

        <div class="store-title">
            RASSIM STORE
        </div>

        <div class="panel">
            <h2>PANEL LIFETIME</h2>
            <div class="price">106 $</div>
        </div>

        <div class="panel">
            <h2>PANEL 90 DAYS</h2>
            <div class="price">106 $</div>
        </div>

        <div class="panel">
            <h2>PANEL 31 DAYS</h2>
            <div class="price">106 $</div>
        </div>

        <div class="panel">
            <h2>PANEL 7 DAYS</h2>
            <div class="price">106 $</div>
        </div>

        <div class="discord">
            <a href="https://discord.gg/5B7KD2Y6C"
            target="_blank">
            <i class="fab fa-discord"></i>
            </a>
        </div>

    </div>
</div>

<script>
function login(){
    let pass = document.getElementById("password").value;

    if(pass === "RASSIM97"){
        document.getElementById("loginScreen").style.display="none";
        document.getElementById("mainSite").style.display="block";
    }else{
        alert("Wrong Password");
    }
}

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*3+1,
        dx:(Math.random()-0.5)*1,
        dy:(Math.random()-0.5)*1
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="#00aaff";
        ctx.shadowColor="#00aaff";
        ctx.shadowBlur=15;
        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0 || p.x>canvas.width) p.dx*=-1;
        if(p.y<0 || p.y>canvas.height) p.dy*=-1;
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});
</script>

</body>
</html>
