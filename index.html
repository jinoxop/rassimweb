<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RASSIM XITER</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<!-- Font Awesome (Discord icon) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#050505;
    color:white;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(0,89,255,.15), transparent 30%),
    radial-gradient(circle at 80% 50%, rgba(0,89,255,.2), transparent 30%);
    z-index:-1;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 8%;
    position:fixed;
    width:100%;
    backdrop-filter: blur(10px);
    background:rgba(0,0,0,.2);
    z-index:999;
}

.logo{
    font-size:32px;
    font-weight:800;
    color:#fff;
}

.logo span{
    color:#2563ff;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    transition:.3s;
}

nav a:hover{
    color:#2563ff;
}

/* DISCORD ICON BUTTON */
.discord-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    background:linear-gradient(90deg,#5865F2,#4752C4);
    padding:12px 20px;
    border-radius:40px;
    text-decoration:none;
    color:white;
    box-shadow:0 0 25px rgba(88,101,242,.6);
    transition:.3s;
}

.discord-btn:hover{
    transform:scale(1.05);
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 8%;
}

.hero-text{
    max-width:600px;
}

.hero-text h1{
    font-size:80px;
    line-height:1;
    margin-bottom:20px;
}

.hero-text h1 span{
    color:#2563ff;
}

.hero-text p{
    color:#cfcfcf;
    margin-bottom:30px;
}

.buy-btn{
    background:white;
    color:black;
    padding:15px 35px;
    border-radius:50px;
    text-decoration:none;
    font-weight:700;
}

.hero-image img{
    width:500px;
    border-radius:20px;
    filter:drop-shadow(0 0 30px #2563ff);
}

/* PRICING */
.pricing{
    padding:100px 8%;
}

.section-title{
    text-align:center;
    font-size:60px;
    margin-bottom:50px;
}

.section-title span{
    color:#2563ff;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(37,99,255,.3);
    border-radius:25px;
    padding:35px;
    text-align:center;
    transition:.3s;
    backdrop-filter:blur(10px);
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 35px #2563ff;
}

.card h2{
    font-size:28px;
    margin-bottom:15px;
}

.price{
    font-size:45px;
    color:#2563ff;
    font-weight:800;
    margin-bottom:20px;
}

.card button{
    border:none;
    padding:14px 30px;
    border-radius:50px;
    background:linear-gradient(90deg,#2563ff,#4f46e5);
    color:white;
    cursor:pointer;
}

/* FOOTER */
footer{
    text-align:center;
    padding:40px;
    color:#888;
}

.glow{
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #2563ff;
    }
    to{
        text-shadow:0 0 30px #2563ff;
    }
}

@media(max-width:900px){
    .hero{
        flex-direction:column;
        text-align:center;
        padding-top:120px;
    }

    .hero-text h1{
        font-size:50px;
    }

    .hero-image img{
        width:100%;
        max-width:400px;
        margin-top:40px;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">RASSIM <span>XITER</span></div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Panel</a>
        <a href="#">Pricing</a>
    </nav>

    <!-- DISCORD BUTTON بدل Contact -->
    <a class="discord-btn" href="https://discord.gg/DFv6nNtvm" target="_blank">
        <i class="fa-brands fa-discord"></i>
        Discord
    </a>
</header>

<section class="hero">

    <div class="hero-text">
        <h1 class="glow">PURE <span>POWER</span></h1>

        <p>
            Premium Panels and Services by RASSIM XITER.
            Fast, secure and professional experience.
        </p>

        <a class="buy-btn" href="#pricing">BUY PANEL</a>
    </div>

    <!-- IMAGE (يمكن تغييرها بسهولة) -->
    <div class="hero-image">
        <img src="https://i.postimg.cc/FKrmLg4n/DFC4632F-0FAE-4920-8F90-8D36E7C7DE1D.png"
        alt="">
    </div>

</section>

<section class="pricing" id="pricing">

    <h1 class="section-title">
        PANEL <span>BUY</span>
    </h1>

    <div class="cards">

        <div class="card">
            <h2>LIFE TIME</h2>
            <div class="price">$50</div>
            <button>BUY NOW</button>
        </div>

        <div class="card">
            <h2>90 DAYS</h2>
            <div class="price">$30</div>
            <button>BUY NOW</button>
        </div>

        <div class="card">
            <h2>30 DAYS</h2>
            <div class="price">$15</div>
            <button>BUY NOW</button>
        </div>

        <div class="card">
            <h2>7 DAYS</h2>
            <div class="price">$10</div>
            <button>BUY NOW</button>
        </div>

    </div>

</section>

<footer>
    © 2026 RASSIM XITER - All Rights Reserved
</footer>

<script>
document.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("mousemove",()=>{
        card.style.transform="translateY(-10px) scale(1.03)";
    });

    card.addEventListener("mouseleave",()=>{
        card.style.transform="translateY(0) scale(1)";
    });
});
</script>

</body>
</html>
